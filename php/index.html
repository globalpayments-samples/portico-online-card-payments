<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Payments</title>
    <style>
        /* Center the form horizontally and set a max width */
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            font-size: 0.79em;
        }
        #credit-card label { font-size: 1em; }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Form Heading */
        h1 {
            font-size: 2em;
            margin-bottom: 0.2em;
        }

        h2 {
            font-size: 1.2em;
            margin-bottom: 1em;
        }

        /* General Form Styles */
        form {
            border-top: 3px solid #000000;
            padding-top: 20px;
        }

        /* Input Fields */
        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="number"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            box-sizing: border-box;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        /* Card Expiration and CVV side by side on larger screens */
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .row .half {
            flex: 1 1 48%;
        }

        /* Submit Button */
        button {
            width: 100%;
            background-color: #0077cc;
            color: white;
            padding: 14px 20px;
            margin-top: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #005fa3;
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            .row {
                flex-direction: column;
            }
            .row .half {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Card Payments</h1>
        <h2>Payment Form</h2>
        
        <form id="payment-form" action="/process-payment.php" method="POST">
            <div>
                <label for="amount">Amount ($):</label>
                <input type="number" id="amount" name="amount" min="0.01" step="0.01" value="10.00" required>
            </div>
            
            <div>
                <label for="billing_zip">Billing Zip Code:</label>
                <input type="text" id="billing_zip" name="billing_zip" required>
            </div>

            <div id="credit-card"></div>
        </form>
    </div>

    <script src="https://js.globalpay.com/v1/globalpayments.js"></script>
    <script>
        // Helper function to ensure GlobalPayments is loaded
        function ensureGlobalPaymentsReady() {
            return new Promise((resolve, reject) => {
                if (typeof GlobalPayments !== 'undefined') {
                    resolve();
                } else {
                    let attempts = 0;
                    const checkInterval = setInterval(() => {
                        attempts++;
                        if (typeof GlobalPayments !== 'undefined') {
                            clearInterval(checkInterval);
                            resolve();
                        } else if (attempts >= 10) {
                            clearInterval(checkInterval);
                            reject(new Error('GlobalPayments failed to initialize'));
                        }
                    }, 500);
                }
            });
        }

        // Fetch with retry logic
        async function fetchWithRetry(url, maxAttempts = 3) {
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (attempt === maxAttempts) throw error;
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempt) * 100));
                }
            }
        }

        // Initialize payment form
        async function initializePaymentForm() {
            const form = document.getElementById('payment-form');
            form.style.opacity = '0.5';
            form.style.pointerEvents = 'none';

            try {
                await ensureGlobalPaymentsReady();
                const config = await fetchWithRetry('/config.php');
                
                GlobalPayments.configure({
                    publicApiKey: config.data.publicApiKey
                });

                const cardForm = GlobalPayments.creditCard.form('#credit-card', { style: "gp-default" });

                cardForm.on('token-success', (resp) => {
                    const token = document.createElement('input');
                    token.type = 'hidden';
                    token.name = 'payment_token';
                    token.value = resp.paymentReference;

                    form.appendChild(token);
                    form.submit();
                });

                cardForm.on('token-error', (error) => {
                    alert('Error tokenizing card: ' + error.message);
                });

                form.style.opacity = '1';
                form.style.pointerEvents = 'auto';
            } catch (error) {
                const errorDiv = document.createElement('div');
                errorDiv.style.color = 'red';
                errorDiv.textContent = 'Unable to initialize payment form. Please refresh the page.';
                form.parentNode.insertBefore(errorDiv, form);
                console.error('Payment form initialization failed:', error);
            }
        }

        // Start initialization when DOM is ready
        document.addEventListener('DOMContentLoaded', initializePaymentForm);
    </script>
</body>
</html>
