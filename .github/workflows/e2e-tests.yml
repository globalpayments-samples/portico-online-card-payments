name: E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths-ignore: 
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      test_implementation:
        description: 'Test specific implementation'
        required: false
        default: 'nodejs'
        type: choice
        options:
          - 'nodejs'
          - 'php'
          - 'python'
          - 'java'
          - 'go'
          - 'dotnet'

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  PHP_VERSION: '8.3'
  JAVA_VERSION: '21'
  GO_VERSION: '1.23'
  DOTNET_VERSION: '9.0.x'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        implementation: [nodejs, php, python, java, go, dotnet]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Setup Python
      if: matrix.implementation == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Setup PHP
      if: matrix.implementation == 'php'
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, curl, json
        tools: composer:v2
    
    - name: Setup Java
      if: matrix.implementation == 'java'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
    
    - name: Setup Go
      if: matrix.implementation == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Setup .NET
      if: matrix.implementation == 'dotnet'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install test dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install chromium
    
    - name: Setup environment
      run: |
        echo "PUBLIC_API_KEY=${{ vars.PUBLIC_API_KEY || 'pkapi_test_key' }}" > .env
        echo "SECRET_API_KEY=${{ secrets.SECRET_API_KEY || 'skapi_test_key' }}" >> .env
        
        # Copy .env to implementation directories
        cp .env ${{ matrix.implementation }}/.env
    
    - name: Install implementation dependencies
      run: |
        cd ${{ matrix.implementation }}
        case "${{ matrix.implementation }}" in
          nodejs) npm ci ;;
          php) composer install --no-dev --optimize-autoloader ;;
          python) 
            python -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            ;;
          java) mvn clean compile -DskipTests ;;
          go) go mod download ;;
          dotnet) dotnet restore ;;
        esac
    
    - name: Run E2E tests
      run: |
        export IMPLEMENTATION_FILTER="${{ matrix.implementation }}"
        npm run test:ci
      env:
        CI: true
        PUBLIC_API_KEY: ${{ vars.PUBLIC_API_KEY || 'pkapi_test_key' }}
        SECRET_API_KEY: ${{ secrets.SECRET_API_KEY || 'skapi_test_key' }}
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.implementation }}
        path: |
          playwright-report/
          test-results/
        retention-days: 7
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.implementation }}
        path: |
          ${{ matrix.implementation }}/*.log
        retention-days: 3

  summary:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Test Summary
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "Tests completed for all implementations" >> $GITHUB_STEP_SUMMARY
        echo "Check individual job results for details" >> $GITHUB_STEP_SUMMARY